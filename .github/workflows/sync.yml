name: Sync Polymarket markets

on:
  schedule:
    # Every 15 minutes (UTC). GitHub may delay scheduled jobs by a few minutes.
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: sync-markets
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market sync once
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m app.jobs.sync_markets --once
